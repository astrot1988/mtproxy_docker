<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MTProxy Stats</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">MTProxy Telemetry</p>
          <h1>Runtime Stats Console</h1>
          <p class="lede">Structured live metrics from the local MTProxy `http-stats` endpoint with a strict operator-focused layout.</p>
        </div>
        <div class="status-panel">
          <div class="status-line">
            <span class="dot" id="status-dot"></span>
            <span id="status-text">Connecting</span>
          </div>
          <p id="status-meta">Waiting for first sample</p>
        </div>
      </header>

      <section class="cards" id="summary-cards"></section>

      <article class="panel metrics-panel">
        <div class="panel-head">
          <div>
            <h2>Metrics</h2>
            <p class="panel-copy">Normalized counters and values exposed by the local MTProxy stats endpoint.</p>
          </div>
          <span class="caption" id="metric-count">0 rows</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Metric</th>
                <th>Value</th>
              </tr>
            </thead>
            <tbody id="metrics-body"></tbody>
          </table>
        </div>
      </article>
    </main>
    <script src="/app.js"></script>
  </body>
  </html>
